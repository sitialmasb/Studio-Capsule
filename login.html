<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | STUDIO CAPSULE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F4F4F2; }
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-[#333331] min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-sm bg-white p-10 rounded-2xl shadow-sm border border-[#E8E2D9] text-center fade-in">
        <div class="mb-10">
            <h2 class="text-2xl font-light tracking-[0.4em] uppercase mb-2">Welcome</h2>
            <div class="w-8 h-[1px] bg-[#333331] mx-auto mb-4"></div>
            <p class="text-[#888880] text-[9px] uppercase tracking-[0.2em]">Enter credentials to start session</p>
        </div>
        
        <form id="login-form" class="space-y-6 text-left">
            <div>
                <label class="block text-[8px] font-bold uppercase tracking-widest text-[#888880] mb-2">Username</label>
                <input type="text" id="username" required class="w-full px-4 py-3 bg-[#F9F9F7] border border-[#E8E2D9] rounded-lg focus:outline-none focus:border-[#333331] text-xs tracking-widest transition-all">
            </div>
            <div>
                <label class="block text-[8px] font-bold uppercase tracking-widest text-[#888880] mb-2">Access Key</label>
                <input type="password" id="password" required class="w-full px-4 py-3 bg-[#F9F9F7] border border-[#E8E2D9] rounded-lg focus:outline-none focus:border-[#333331] text-xs tracking-widest transition-all">
            </div>
            <button type="submit" class="w-full bg-[#333331] text-white py-4 rounded-lg text-[10px] font-bold uppercase tracking-[0.3em] hover:bg-black transition-all shadow-lg mt-4">
                Initialize Studio
            </button>
        </form>
        <p id="login-error" class="text-red-400 text-[8px] uppercase tracking-widest mt-6 hidden">Invalid Credentials</p>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // Kredensial: admin / 1234
            if (user === 'admin' && pass === '1234') {
                localStorage.setItem('studio_session', 'active');
                window.location.replace('index.html');
            } else {
                const err = document.getElementById('login-error');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 2000);
            }
        };
    </script>
</body>
</html>
