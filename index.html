<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STUDIO CAPSULE | Digital Photobooth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F4F4F2] text-[#333331] overflow-x-hidden">

    <section id="page-1" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-16">
            <h1 class="text-4xl md:text-5xl font-light tracking-[0.3em] uppercase mb-4">STUDIO CAPSULE</h1>
            <div class="w-10 h-[1px] bg-[#333331] mx-auto mb-4"></div>
            <p class="text-[#888880] text-[10px] uppercase tracking-[0.2em]">Self-portrait digital experience</p>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full max-w-4xl">
            <div onclick="selectLayout(1)" class="layout-card">
                <div class="preview-box h-24 w-16 border-2 border-dashed border-gray-300 rounded mx-auto"></div>
                <p>1 Frame</p>
            </div>
            <div onclick="selectLayout(2)" class="layout-card">
                <div class="preview-box h-24 w-16 flex flex-col gap-1 mx-auto">
                    <div class="flex-1 border-2 border-dashed border-gray-300 rounded-sm"></div>
                    <div class="flex-1 border-2 border-dashed border-gray-300 rounded-sm"></div>
                </div>
                <p>2 Frames</p>
            </div>
            <div onclick="selectLayout(3)" class="layout-card">
                <div class="preview-box h-24 w-16 flex flex-col gap-1 mx-auto">
                    <div class="flex-1 border-2 border-dashed border-gray-300 rounded-sm"></div>
                    <div class="flex-1 border-2 border-dashed border-gray-300 rounded-sm"></div>
                    <div class="flex-1 border-2 border-dashed border-gray-300 rounded-sm"></div>
                </div>
                <p>3 Frames</p>
            </div>
            <div onclick="selectLayout(4)" class="layout-card">
                <div class="preview-box h-24 w-16 flex flex-col gap-1 mx-auto">
                    <div class="flex-1 border-2 border-dashed border-gray-300 rounded-sm"></div>
                    <div class="flex-1 border-2 border-dashed border-gray-300 rounded-sm"></div>
                    <div class="flex-1 border-2 border-dashed border-gray-300 rounded-sm"></div>
                    <div class="flex-1 border-2 border-dashed border-gray-300 rounded-sm"></div>
                </div>
                <p>4 Frames</p>
            </div>
        </div>
    </section>

    <section id="page-2" class="hidden min-h-screen flex flex-col items-center p-4">
        <div class="w-full max-w-5xl flex flex-col lg:flex-row gap-12 mt-8">
            <div class="flex-1">
                <button onclick="goBack(1)" class="mb-6 text-[10px] font-bold uppercase tracking-widest text-[#888880] hover:text-black transition-colors">← CHANGE LAYOUT</button>
                <div class="relative bg-white rounded-lg overflow-hidden shadow-2xl aspect-[3/2] border-[12px] border-white">
                    <video id="video" autoplay playsinline class="w-full h-full object-cover mirror"></video>
                    <div id="countdown" class="absolute inset-0 flex items-center justify-center text-9xl text-white font-light hidden bg-black/20 backdrop-blur-[2px]"></div>
                </div>
                
                <div class="mt-10 flex flex-col items-center gap-6">
                    <div class="flex items-center gap-4 bg-white px-6 py-2 rounded-full shadow-sm border border-[#E8E2D9]">
                        <span class="text-[9px] font-bold uppercase tracking-widest">Mirror Mode</span>
                        <input type="checkbox" id="mirror-toggle" checked onchange="toggleMirror()">
                    </div>
                    <button id="capture-btn" class="w-20 h-20 bg-white border-[1px] border-[#333331] rounded-full shadow-xl active:scale-90 transition-all flex items-center justify-center">
                        <div class="w-16 h-16 border-[1px] border-[#333331] rounded-full"></div>
                    </button>
                    <p class="text-[9px] font-bold uppercase tracking-[0.3em] text-[#888880]">Tap to capture</p>
                </div>
            </div>

            <div class="w-full lg:w-72">
                <h3 class="text-center font-bold text-[10px] mb-6 uppercase tracking-[0.2em] text-[#333331]">Pose Review</h3>
                <div id="pose-slots" class="grid grid-cols-2 lg:grid-cols-1 gap-4"></div>
                <button id="next-to-edit" class="hidden w-full mt-8 bg-[#333331] text-white py-4 rounded-lg text-[10px] font-bold uppercase tracking-[0.2em] shadow-lg">Proceed to Edit</button>
            </div>
        </div>
    </section>

    <section id="page-3" class="hidden min-h-screen flex flex-col lg:flex-row items-center justify-center gap-12 p-6">
        <div class="relative shadow-2xl bg-white p-4 rounded-sm border border-[#D1D1CB] touch-none">
            <canvas id="result-canvas"></canvas>
        </div>

        <div class="w-full max-w-xs space-y-6">
            <div class="bg-white p-6 rounded-lg shadow-sm border border-[#E8E2D9]">
                <h3 class="font-bold mb-4 text-center uppercase text-[10px] tracking-[0.2em] text-[#333331]">Typography</h3>
                <div class="space-y-3">
                    <input type="text" id="text-input" placeholder="Enter text..." class="w-full px-4 py-2 text-[10px] border border-[#E8E2D9] rounded focus:outline-none focus:border-[#333331] uppercase tracking-widest">
                    <div class="flex gap-2">
                        <select id="font-select" class="flex-1 text-[9px] border border-[#E8E2D9] rounded p-2 bg-white uppercase tracking-tighter">
                            <option value="Inter">Modern (Sans)</option>
                            <option value="Serif">Classic (Serif)</option>
                            <option value="Cursive">Handwritten</option>
                            <option value="Monospace">Typewriter</option>
                        </select>
                        <button onclick="addText()" class="bg-[#333331] text-white px-4 py-2 rounded text-[9px] font-bold uppercase tracking-widest">Add</button>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm border border-[#E8E2D9]">
                <h3 class="font-bold mb-4 text-center uppercase text-[10px] tracking-[0.2em] text-[#333331]">Ornaments</h3>
                <div class="grid grid-cols-4 gap-4" id="sticker-list">
                    <button onclick="addSticker('🌸')" class="sticker-opt">🌸</button>
                    <button onclick="addSticker('🌿')" class="sticker-opt">🌿</button>
                    <button onclick="addSticker('✨')" class="sticker-opt">✨</button>
                    <button onclick="addSticker('☁️')" class="sticker-opt">☁️</button>
                    <button onclick="addSticker('🎀')" class="sticker-opt">🎀</button>
                    <button onclick="addSticker('🍓')" class="sticker-opt">🍓</button>
                    <button onclick="addSticker('🤍')" class="sticker-opt">🤍</button>
                    <button onclick="addSticker('🧸')" class="sticker-opt">🧸</button>
                </div>
                <p class="text-[8px] mt-6 text-center text-[#888880] uppercase tracking-wider leading-relaxed">Drag items to reposition</p>
                <button onclick="clearOrnaments()" class="w-full mt-4 text-[8px] text-red-400 uppercase tracking-widest hover:text-red-600">Clear All</button>
            </div>

            <div class="space-y-4">
                <button onclick="downloadImage()" class="w-full bg-[#333331] text-white font-bold py-5 rounded-lg text-[10px] tracking-[0.2em] uppercase shadow-md">Download Image</button>
                <button onclick="location.reload()" class="w-full text-[#888880] text-[9px] font-bold py-2 uppercase tracking-[0.2em] hover:text-black transition-colors">Start New Session</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
